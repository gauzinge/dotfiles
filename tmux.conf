###########################################################################
# tell tmux to use ZSH
###########################################################################
set-option -g default-shell $SHELL
#set-option -g default-shell "/usr/uocal/bin/zsh -i"
set -g default-shell $SHELL 
#set -g default-command "reattach-to-user-namespace -l ${SHELL}"
set -g default-command "reattach-to-user-namespace -l zsh -i"

###########################################################################
# Colors
###########################################################################
set -g default-terminal "xterm-256color-italic"
set-option -ga terminal-overrides ",xterm-256color-italic:Tc"

###########################################################################
# remap prefix from 'C-b' to 'C-a'
###########################################################################
unbind C-b
set-option -g prefix C-a
# reload config file (change file location to your the tmux.conf you want to use)
bind-key r source-file /Users/schurl/.tmux.conf ; display-message ".tmux.conf reloaded."

###########################################################################
# window management
###########################################################################
bind-key n new-window
bind-key "'" choose-window
# Ctrl-Left/Right cycles thru windows (no prefix)
bind-key -n "C-p"  select-window -t :-
bind-key -n "C-n" select-window -t :+

###########################################################################
# Pane management / navigation
###########################################################################

# Horizontal splits with s or C-s
    unbind s
    unbind C-s
    bind-key s split-window

# Vertical split with v or C-v
    unbind v
    unbind C-v
    bind-key v split-window -h

bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key H resize-pane -L 5
bind-key L resize-pane -R 5
###########################################################################
# sane pane naviagation
###########################################################################
set -g xterm-keys on

###########################################################################
#Options
###########################################################################
set-option -g base-index 1
set-option -g display-time 2000
set-option -g status-keys vi
set-option -g history-limit 10000
set-option -s escape-time 100
setw -g monitor-activity on

 
###########################################################################
# to have sane pane navigation in nvim
###########################################################################
#nnoremap <silent> <BS> :TmuxNavigateLeft<cr>

###########################################################################
# focus event for vim
###########################################################################
set -g focus-events on

###########################################################################
# Scrollback / pastebuffer
###########################################################################
# Vim-style copy/paste
# cytl-b + y enter copy mode
# v to start selecting
# y to end and yank selection
# shift-y to copy and paste to prompt
# ctrl-b + p to paste
set -g @shell_mode 'vi'
set-window-option -g mode-keys vi
unbind [
unbind ]
bind c copy-mode
unbind p
bind p paste-buffer
bind-key -t vi-copy 'v' begin-selection
#bind-key -t vi-copy 'y' copy-selection
bind-key -t vi-copy 'r' rectangle-toggle
bind-key -t vi-copy 'y' copy-pipe "reattach-to-user-namespace pbcopy"

###########################################################################
# Mouse mode
###########################################################################
#setw -g mouse
#set -g mode-mouse on
set-option -g mouse on
set -g @scroll-without-changing-pane "on"
set -g @scroll-in-moused-over-pane "on"
set -g @scroll-speed-num-lines-per-scroll "5"

#set -ga terminal-overrides ',xterm-color:smcup@:rmcup@'

###########################################################################
# DESIGN CHANGES
###########################################################################

# panes
set -g pane-border-fg black
set -g pane-active-border-fg brightred

## Status bar design
# status line
#set -g status-utf8 on
set -g status-justify left
set -g status-bg default
set -g status-fg colour12
set -g status-interval 2

# messaging
set -g message-fg black
set -g message-bg yellow
set -g message-command-fg blue
set -g message-command-bg black

#window mode
setw -g mode-bg colour6
setw -g mode-fg colour0

# window status
setw -g window-status-format " #F#I:#W#F "
setw -g window-status-current-format " #F#I:#W#F "
setw -g window-status-format "#[fg=magenta]#[bg=black] #I #[bg=cyan]#[fg=colour8] #W "
setw -g window-status-current-format "#[bg=brightmagenta]#[fg=colour8] #I #[fg=colour8]#[bg=colour14] #W "
setw -g window-status-current-bg colour0
setw -g window-status-current-fg colour11
setw -g window-status-current-attr dim
setw -g window-status-bg green
setw -g window-status-fg black
setw -g window-status-attr reverse

# Info on left (I don't have a session display for now)
set -g status-left ''

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# The modes {
setw -g clock-mode-colour colour135
setw -g mode-attr bold
setw -g mode-fg colour196
setw -g mode-bg colour238

# }
# The panes {
set -g pane-border-bg colour235
#set -g pane-border-fg colour238
#set -g pane-border-bg colour238
set -g pane-border-fg colour238
set -g pane-active-border-bg colour236
#set -g pane-active-border-fg colour51
#set -g pane-active-border-bg colour208
set -g pane-active-border-fg colour208

# }
# The statusbar {

set -g status-position top
set -g status-bg colour247
set -g status-fg colour137
set -g status-attr dim
set -g status-left ''

###########################################################################
# Status bar right!
###########################################################################
set -g status-right '#{prefix_highlight} #[fg=colour232,bg=colour247,bold] | #[fg=colour232,bg=colour247,bold] #(~/bin/countdown.sh) | #[fg=colour232,bg=colour247,bold] %a %d.%m | #[fg=colour232,bg=colour247,bold] %H:%M:%S | #{online_status} | #{battery_status_bg} #{battery_icon} #{battery_percentage}  '
set -g status-right-length 80
set -g status-left-length 20

setw -g window-status-current-fg colour81
setw -g window-status-current-bg colour238
setw -g window-status-current-attr bold
setw -g window-status-current-format ' #I#[fg=colour250]:#[fg=colour255]#W#[fg=colour50]#F '

setw -g window-status-fg colour138
setw -g window-status-bg colour235
setw -g window-status-attr none
setw -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '

setw -g window-status-bell-attr bold
setw -g window-status-bell-fg colour255
setw -g window-status-bell-bg colour1

# }
# The messages {

set -g message-attr bold
set -g message-fg colour232
set -g message-bg colour166

# }

# Retach userspaces
#maybe this!
#set -g default-command "reattach-to-user-namespace -l zsh -i"


###########################################################################
# Plugin Manager
###########################################################################
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
